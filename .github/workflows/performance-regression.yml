name: Performance Regression Testing

# Uses the shared .github/actions/setup-perf-env composite action for
# cluster provisioning, eliminating the duplicate kind/kubectl/k6 install
# steps that previously existed in this workflow.

on:
  workflow_dispatch:
    inputs:
      baseline_version:
        description: Baseline version to compare against
        required: false
        default: v0.1.0
      regression_threshold:
        description: Regression threshold percentage
        required: false
        default: "10"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  K6_VERSION: "0.54.0"

jobs:
  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build Operator
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION="pr-${{ github.event.pull_request.number || 'manual' }}-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "perf-regression"

      - name: Build release binary
        run: cargo build --release --locked

      - name: Build Docker image
        run: docker build -t "stellar-operator:${{ steps.version.outputs.version }}" .

      - name: Save Docker image
        run: |
          docker save "stellar-operator:${{ steps.version.outputs.version }}" \
            | gzip > stellar-operator-image.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: operator-artifacts-${{ steps.version.outputs.version }}
          path: |
            target/release/stellar-operator
            stellar-operator-image.tar.gz
          retention-days: 7

  # ── Performance test ──────────────────────────────────────────────────────
  performance-test:
    name: Run Performance Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download operator artifacts
        uses: actions/download-artifact@v4
        with:
          name: operator-artifacts-${{ needs.build.outputs.version }}

      - name: Load Docker image
        run: |
          gunzip stellar-operator-image.tar.gz
          docker load < stellar-operator-image.tar

      # Shared composite action handles k6, kind, kubectl, cluster, operator
      - name: Setup performance environment
        uses: ./.github/actions/setup-perf-env
        with:
          k6-version: ${{ env.K6_VERSION }}
          cluster-name: benchmark
          operator-image-tag: ${{ needs.build.outputs.version }}
          worker-nodes: "2"

      - name: Determine baseline
        id: baseline
        run: |
          BASELINE_VERSION="${{ github.event.inputs.baseline_version || 'v0.1.0' }}"
          BASELINE_FILE="benchmarks/baselines/${BASELINE_VERSION}.json"
          if [[ -f "$BASELINE_FILE" ]]; then
            echo "baseline_file=$BASELINE_FILE" >> "$GITHUB_OUTPUT"
            echo "has_baseline=true" >> "$GITHUB_OUTPUT"
            echo "✅ Using baseline: $BASELINE_FILE"
          else
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No baseline found, running without comparison"
          fi

      - name: Run operator benchmarks
        id: operator_bench
        continue-on-error: true
        run: |
          mkdir -p results
          k6 run \
            --env BASE_URL=http://localhost:8080 \
            --env K8S_API_URL=http://localhost:8001 \
            --env NAMESPACE=stellar-benchmark \
            --env RUN_ID=${{ github.run_id }} \
            --env VERSION=${{ needs.build.outputs.version }} \
            --env GIT_SHA=${{ github.sha }} \
            --env BASELINE_FILE=${{ steps.baseline.outputs.baseline_file }} \
            --out json=results/operator-benchmark-raw.json \
            benchmarks/k6/operator-load-test.js

      - name: Collect operator logs
        if: always()
        run: |
          kubectl logs -n stellar-system -l app=stellar-operator \
            --tail=1000 > results/operator-logs.txt || true
          kubectl get events -n stellar-benchmark \
            --sort-by='.lastTimestamp' > results/events.txt || true
          kubectl get pods -n stellar-benchmark -o wide > results/pods.txt || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results-${{ needs.build.outputs.version }}
          path: results/
          retention-days: 30

  # ── Regression analysis ───────────────────────────────────────────────────
  regression-analysis:
    name: Regression Analysis
    runs-on: ubuntu-latest
    needs: [build, performance-test]
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: performance-results-${{ needs.build.outputs.version }}
          path: results/

      - name: Determine baseline
        id: baseline
        run: |
          BASELINE_VERSION="${{ github.event.inputs.baseline_version || 'v0.1.0' }}"
          BASELINE_FILE="benchmarks/baselines/${BASELINE_VERSION}.json"
          if [[ -f "$BASELINE_FILE" ]]; then
            echo "baseline_file=$BASELINE_FILE" >> "$GITHUB_OUTPUT"
            echo "has_baseline=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compare with baseline
        if: steps.baseline.outputs.has_baseline == 'true'
        id: compare
        continue-on-error: true
        run: |
          THRESHOLD="${{ github.event.inputs.regression_threshold || '10' }}"
          python3 benchmarks/scripts/compare_benchmarks.py compare \
            --current results/benchmark-summary.json \
            --baseline "${{ steps.baseline.outputs.baseline_file }}" \
            --threshold "$THRESHOLD" \
            --output results/regression-report.json \
            --verbose

      - name: Generate performance report
        id: report
        run: |
          {
            printf "## 📊 Performance Regression Test Results\n\n"
            printf "**Version:** %s\n" "${{ needs.build.outputs.version }}"
            printf "**Commit:** %s\n" "${{ github.sha }}"
            printf "**Baseline:** %s\n" "${{ github.event.inputs.baseline_version || 'v0.1.0' }}"
            printf "**Threshold:** %s%%\n\n" "${{ github.event.inputs.regression_threshold || '10' }}"

            if [[ -f results/benchmark-summary.json ]]; then
              TPS=$(jq -r '.metrics.tps.avg // "N/A"' results/benchmark-summary.json)
              HTTP_P95=$(jq -r '.metrics.http_req_duration.p95 // "N/A"' results/benchmark-summary.json)
              HTTP_P99=$(jq -r '.metrics.http_req_duration.p99 // "N/A"' results/benchmark-summary.json)
              RECON_P95=$(jq -r '.metrics.reconciliation_duration.p95 // "N/A"' results/benchmark-summary.json)
              RECON_P99=$(jq -r '.metrics.reconciliation_duration.p99 // "N/A"' results/benchmark-summary.json)
              API_P95=$(jq -r '.metrics.api_latency.p95 // "N/A"' results/benchmark-summary.json)
              ERROR_RATE=$(jq -r '.metrics.error_rate // "N/A"' results/benchmark-summary.json)
              TOTAL=$(jq -r '.metrics.total_requests // "N/A"' results/benchmark-summary.json)

              printf "### 🎯 Key Performance Metrics\n\n"
              printf "| Metric | Value | Threshold |\n|--------|-------|----------|\n"
              printf "| **TPS (avg)** | %s req/s | > 100 req/s |\n" "$TPS"
              printf "| **HTTP Latency (p95)** | %s ms | < 500 ms |\n" "$HTTP_P95"
              printf "| **HTTP Latency (p99)** | %s ms | < 1000 ms |\n" "$HTTP_P99"
              printf "| **Reconciliation (p95)** | %s ms | < 3000 ms |\n" "$RECON_P95"
              printf "| **Reconciliation (p99)** | %s ms | < 5000 ms |\n" "$RECON_P99"
              printf "| **API Latency (p95)** | %s ms | < 200 ms |\n" "$API_P95"
              printf "| **Error Rate** | %s | < 0.01 |\n" "$ERROR_RATE"
              printf "| **Total Requests** | %s | - |\n\n" "$TOTAL"
            fi

            if [[ -f results/regression-report.json ]]; then
              OVERALL_PASSED=$(jq -r '.overall_passed' results/regression-report.json)
              SUMMARY=$(jq -r '.summary' results/regression-report.json)
              NUM_REG=$(jq -r '.regressions | length' results/regression-report.json)
              NUM_IMP=$(jq -r '.improvements | length' results/regression-report.json)
              NUM_STA=$(jq -r '.stable | length' results/regression-report.json)

              if [[ "$OVERALL_PASSED" == "true" ]]; then
                printf "### ✅ Regression Check: PASSED\n\n%s\n\n" "$SUMMARY"
              else
                printf "### ❌ Regression Check: FAILED\n\n%s\n\n" "$SUMMARY"
              fi
              printf "- 🟢 Improvements: %s\n- ⚪ Stable: %s\n- 🔴 Regressions: %s\n\n" \
                "$NUM_IMP" "$NUM_STA" "$NUM_REG"
            else
              printf "### ℹ️ No Baseline Comparison\n\nNo baseline found for comparison.\n\n"
            fi

            printf "---\n*Performance tests run on kind cluster with GitHub Actions*\n"
            printf "*Run ID: %s*\n" "${{ github.run_id }}"
          } > pr-comment.md

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr-comment.md
          edit-mode: replace

      - name: Create job summary
        if: always()
        run: |
          [[ -f pr-comment.md ]] && cat pr-comment.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Check regression status
        if: steps.compare.outcome == 'failure'
        run: |
          if [[ -f results/regression-report.json ]]; then
            OVERALL_PASSED=$(jq -r '.overall_passed' results/regression-report.json)
            if [[ "$OVERALL_PASSED" == "false" ]]; then
              echo "::warning::Performance regression detected! Review the benchmark results."
              [[ -f "${{ steps.baseline.outputs.baseline_file }}" ]] && exit 1 || true
            fi
          fi

  # ── Cleanup ───────────────────────────────────────────────────────────────
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [build, performance-test, regression-analysis]
    if: always()
    steps:
      - name: Install kind
        run: |
          curl -fsSLo ./kind \
            "https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Delete kind cluster
        run: kind delete cluster --name benchmark || true
