---
# Namespace for the webhook
apiVersion: v1
kind: Namespace
metadata:
  name: stellar-webhook
  labels:
    app.kubernetes.io/name: stellar-webhook
    app.kubernetes.io/component: admission-webhook
---
# ServiceAccount for the webhook
apiVersion: v1
kind: ServiceAccount
metadata:
  name: stellar-webhook
  namespace: stellar-webhook
  labels:
    app.kubernetes.io/name: stellar-webhook
---
# ClusterRole for the webhook
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: stellar-webhook
  labels:
    app.kubernetes.io/name: stellar-webhook
rules:
  # Read StellarNodes for validation context
  - apiGroups: ["stellar.io"]
    resources: ["stellarnodes"]
    verbs: ["get", "list", "watch"]
  # Read ConfigMaps and Secrets for plugin configuration
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: stellar-webhook
  labels:
    app.kubernetes.io/name: stellar-webhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: stellar-webhook
subjects:
  - kind: ServiceAccount
    name: stellar-webhook
    namespace: stellar-webhook
---
# Deployment for the webhook server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stellar-webhook
  namespace: stellar-webhook
  labels:
    app.kubernetes.io/name: stellar-webhook
    app.kubernetes.io/component: admission-webhook
spec:
  replicas: {{ .Values.webhook.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: stellar-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stellar-webhook
        app.kubernetes.io/component: admission-webhook
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.webhook.ports.metrics }}"
    spec:
      serviceAccountName: stellar-webhook
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webhook
          {{- $repo := default .Values.image.repository .Values.webhook.image.repository }}
          {{- $tag := default .Values.image.tag .Values.webhook.image.tag }}
          {{- $pullPolicy := default .Values.image.pullPolicy .Values.webhook.image.pullPolicy }}
          {{- $digest := default .Values.image.digest .Values.webhook.image.digest }}
          image: '{{ if $digest }}{{ $repo }}@{{ $digest }}{{ else }}{{ $repo }}:{{ default .Chart.AppVersion $tag }}{{ end }}'
          imagePullPolicy: '{{ $pullPolicy }}'
          args:
            - "--webhook-port={{ .Values.webhook.ports.https }}"
            - "--metrics-port={{ .Values.webhook.ports.metrics }}"
            - "--cert-dir=/certs"
          ports:
            - name: https
              containerPort: {{ .Values.webhook.ports.https }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.webhook.ports.metrics }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.webhook.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: {{ .Values.webhook.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.webhook.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /ready
              port: https
              scheme: HTTPS
            initialDelaySeconds: {{ .Values.webhook.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.webhook.readinessProbe.periodSeconds }}
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
            - name: plugins
              mountPath: /plugins
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: stellar-webhook-certs
        - name: plugins
          configMap:
            name: stellar-webhook-plugins
            optional: true
      {{- if .Values.webhook.affinity }}
      affinity:
        {{- toYaml .Values.webhook.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.webhook.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.webhook.topologySpreadConstraints | nindent 8 }}
      {{- end }}
---
# Service for the webhook
apiVersion: v1
kind: Service
metadata:
  name: stellar-webhook
  namespace: stellar-webhook
  labels:
    app.kubernetes.io/name: stellar-webhook
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: stellar-webhook
---
# ValidatingWebhookConfiguration
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: stellar-webhook
  labels:
    app.kubernetes.io/name: stellar-webhook
  annotations:
    # cert-manager will inject the CA bundle
    cert-manager.io/inject-ca-from: stellar-webhook/stellar-webhook-cert
webhooks:
  - name: stellarnode.stellar.io
    clientConfig:
      service:
        name: stellar-webhook
        namespace: stellar-webhook
        path: /validate
        port: 443
      # CA bundle will be injected by cert-manager or manually set
      # caBundle: <base64-encoded-ca-cert>
    rules:
      - apiGroups: ["stellar.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["stellarnodes"]
        scope: Namespaced
    admissionReviewVersions: ["v1", "v1beta1"]
    sideEffects: None
    timeoutSeconds: 10
    failurePolicy: Fail
    matchPolicy: Equivalent
    namespaceSelector:
      matchExpressions:
        # Skip kube-system and stellar-webhook namespaces
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - stellar-webhook
---
# Certificate for the webhook (cert-manager)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stellar-webhook-cert
  namespace: stellar-webhook
  labels:
    app.kubernetes.io/name: stellar-webhook
spec:
  secretName: stellar-webhook-certs
  dnsNames:
    - stellar-webhook
    - stellar-webhook.stellar-webhook
    - stellar-webhook.stellar-webhook.svc
    - stellar-webhook.stellar-webhook.svc.cluster.local
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
---
# Self-signed ClusterIssuer (for development)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
# ConfigMap for plugin configuration (optional)
apiVersion: v1
kind: ConfigMap
metadata:
  name: stellar-webhook-plugins
  namespace: stellar-webhook
  labels:
    app.kubernetes.io/name: stellar-webhook
data:
  # Plugin configurations can be added here
  # Each entry should be a JSON file with the plugin config
  plugins.json: |
    {
      "plugins": []
    }
---
{{- if .Values.webhook.podDisruptionBudget.enabled }}
# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: stellar-webhook
  namespace: stellar-webhook
  labels:
    app.kubernetes.io/name: stellar-webhook
spec:
  {{- if .Values.webhook.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.webhook.podDisruptionBudget.minAvailable }}
  {{- end }}
  {{- if .Values.webhook.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.webhook.podDisruptionBudget.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: stellar-webhook
{{- end }}
