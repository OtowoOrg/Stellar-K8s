# doc-coverage.toml
#
# Maps documentation files to the source files they describe.
#
# When a source file changes without a corresponding update to its linked
# documentation, `make check-stale-docs` (or the CI workflow) will flag that
# doc as stale.
#
# Schema
# ------
# [[entry]]
# doc  = "relative path to the doc file"
# src  = ["one or more source globs that this doc covers"]
#
# Globs follow the same syntax as `.gitignore`:
#   *       – any sequence of characters except '/'
#   **      – any sequence of characters including '/'
#   ?       – any single character except '/'
#   [abc]   – character class
#
# Tips
# ----
# • Keep entries sorted alphabetically by `doc` for easy diffing.
# • Use multiple `src` paths when a single doc spans several modules.
# • Add a new entry whenever you create a new doc/feature pair.
# • To silence a false-positive temporarily, set `ignore = true` on the
#   entry and open a follow-up issue.

