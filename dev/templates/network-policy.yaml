# network-policy.yaml — example NetworkPolicy for Stellar node pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: stellar-node-isolation
  namespace: stellar
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: stellar-node
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: stellar
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
