# horizon-dev.yaml — Horizon dev overlay (extends _base-stellarnode.yaml)
apiVersion: stellar.org/v1alpha1
kind: StellarNode
metadata:
  name: horizon-dev
  namespace: stellar
spec:
  nodeType: Horizon
  network: testnet
  version: "2.30.0"
  replicas: 1
  horizonConfig:
    databaseSecretRef: "horizon-db-secret"
    stellarCoreUrl: "http://validator-local:11626"
    enableIngest: true
