name: Webhook Performance Benchmark

# Uses the shared .github/actions/setup-rust composite action for Rust setup.
# Metric collection and baseline comparison follow the same pattern as
# benchmark.yml and performance-regression.yml.

on:
  pull_request:
    paths:
      - "src/webhook/**"
      - "benchmarks/k6/webhook-load-test.js"
      - ".github/workflows/webhook-benchmark.yml"
  push:
    branches: [main]
    paths:
      - "src/webhook/**"
  workflow_dispatch:
    inputs:
      baseline_version:
        description: Baseline version to compare
        required: false
        default: webhook-v0.1.0
      regression_threshold:
        description: Regression threshold %
        required: false
        default: "10"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  K6_VERSION: "0.54.0"

jobs:
  # ── Build ─────────────────────────────────────────────────────────────────
  build-webhook:
    name: Build Webhook Server
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "webhook-bench"

      - name: Build webhook server (release mode)
        run: cargo build --release --locked

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: stellar-operator-webhook-${{ steps.version.outputs.version }}
          path: target/release/stellar-operator
          retention-days: 7

  # ── Benchmark ─────────────────────────────────────────────────────────────
  webhook-benchmark:
    name: Webhook Performance Test
    runs-on: ubuntu-latest
    needs: build-webhook
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          K6_VER="${{ env.K6_VERSION }}"
          curl -fsSL \
            "https://github.com/grafana/k6/releases/download/v${K6_VER}/k6-v${K6_VER}-linux-amd64.tar.gz" \
            | tar xvz
          sudo mv "k6-v${K6_VER}-linux-amd64/k6" /usr/local/bin/
          k6 version

      - name: Install jq and bc
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Download webhook binary
        uses: actions/download-artifact@v4
        with:
          name: stellar-operator-webhook-${{ needs.build-webhook.outputs.version }}
          path: target/release

      - name: Make binary executable
        run: chmod +x target/release/stellar-operator

      - name: Start webhook server
        run: |
          ./target/release/stellar-operator webhook \
            --bind 0.0.0.0:8443 \
            --log-level info &
          WEBHOOK_PID=$!
          echo "WEBHOOK_PID=$WEBHOOK_PID" >> "$GITHUB_ENV"

          echo "Waiting for webhook server to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8443/health > /dev/null 2>&1; then
              echo "Webhook server is ready!"
              break
            fi
            echo "Attempt $i/30: not ready yet..."
            sleep 2
          done

          curl -sf http://localhost:8443/health \
            || { echo "ERROR: Webhook server failed to start"; exit 1; }

      - name: Determine baseline file
        id: baseline
        run: |
          BASELINE_VERSION="${{ github.event.inputs.baseline_version || 'webhook-v0.1.0' }}"
          BASELINE_FILE="benchmarks/baselines/${BASELINE_VERSION}.json"
          if [[ -f "$BASELINE_FILE" ]]; then
            echo "baseline_file=$BASELINE_FILE" >> "$GITHUB_OUTPUT"
            echo "has_baseline=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run webhook benchmarks
        id: benchmark
        continue-on-error: true
        run: |
          mkdir -p results
          k6 run \
            --env WEBHOOK_URL=http://localhost:8443 \
            --env VERSION=${{ needs.build-webhook.outputs.version }} \
            --env GIT_SHA=${{ github.sha }} \
            --env RUN_ID=${{ github.run_id }} \
            --env BASELINE_FILE=${{ steps.baseline.outputs.baseline_file }} \
            --out json=results/webhook-benchmark-raw.json \
            benchmarks/k6/webhook-load-test.js

      - name: Stop webhook server
        if: always()
        run: |
          [[ -n "${WEBHOOK_PID:-}" ]] && kill "$WEBHOOK_PID" || true

      - name: Check benchmark thresholds
        id: check
        run: |
          if [[ ! -f results/webhook-benchmark.json ]]; then
            echo "::warning::Benchmark results not found — skipping threshold check"
            echo "threshold_passed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VAL_P99=$(jq -r '.webhook_metrics.validation_p99' results/webhook-benchmark.json)
          MUT_P99=$(jq -r '.webhook_metrics.mutation_p99' results/webhook-benchmark.json)
          THROUGHPUT=$(jq -r '.webhook_metrics.throughput' results/webhook-benchmark.json)
          ERROR_RATE=$(jq -r '.webhook_metrics.error_rate' results/webhook-benchmark.json)

          echo "validation_p99=$VAL_P99" >> "$GITHUB_OUTPUT"
          echo "mutation_p99=$MUT_P99" >> "$GITHUB_OUTPUT"
          echo "throughput=$THROUGHPUT" >> "$GITHUB_OUTPUT"
          echo "error_rate=$ERROR_RATE" >> "$GITHUB_OUTPUT"

          THRESHOLD_PASSED=true
          (( $(echo "$VAL_P99 > 50" | bc -l) )) \
            && { echo "::warning::Validation p99 ($VAL_P99 ms) > 50 ms"; THRESHOLD_PASSED=false; }
          (( $(echo "$MUT_P99 > 50" | bc -l) )) \
            && { echo "::warning::Mutation p99 ($MUT_P99 ms) > 50 ms"; THRESHOLD_PASSED=false; }
          (( $(echo "$THROUGHPUT < 100" | bc -l) )) \
            && { echo "::warning::Throughput ($THROUGHPUT req/s) < 100 req/s"; THRESHOLD_PASSED=false; }
          (( $(echo "$ERROR_RATE > 0.001" | bc -l) )) \
            && { echo "::warning::Error rate ($ERROR_RATE) > 0.001"; THRESHOLD_PASSED=false; }

          echo "threshold_passed=$THRESHOLD_PASSED" >> "$GITHUB_OUTPUT"

      - name: Compare with baseline
        if: steps.baseline.outputs.has_baseline == 'true'
        id: regression
        run: |
          BASELINE_FILE="${{ steps.baseline.outputs.baseline_file }}"
          CURRENT_FILE="results/webhook-benchmark.json"
          THRESHOLD="${{ github.event.inputs.regression_threshold || '10' }}"

          [[ -f "$CURRENT_FILE" ]] || { echo "No results to compare"; exit 0; }

          BASELINE_VAL=$(jq -r '.webhook_metrics.validation_p99' "$BASELINE_FILE")
          BASELINE_MUT=$(jq -r '.webhook_metrics.mutation_p99' "$BASELINE_FILE")
          BASELINE_TPS=$(jq -r '.webhook_metrics.throughput' "$BASELINE_FILE")

          CURRENT_VAL=$(jq -r '.webhook_metrics.validation_p99' "$CURRENT_FILE")
          CURRENT_MUT=$(jq -r '.webhook_metrics.mutation_p99' "$CURRENT_FILE")
          CURRENT_TPS=$(jq -r '.webhook_metrics.throughput' "$CURRENT_FILE")

          VAL_CHANGE=$(echo "scale=2; ($CURRENT_VAL - $BASELINE_VAL) / $BASELINE_VAL * 100" | bc)
          MUT_CHANGE=$(echo "scale=2; ($CURRENT_MUT - $BASELINE_MUT) / $BASELINE_MUT * 100" | bc)
          TPS_CHANGE=$(echo "scale=2; ($CURRENT_TPS - $BASELINE_TPS) / $BASELINE_TPS * 100" | bc)

          REGRESSION=false
          (( $(echo "$VAL_CHANGE > $THRESHOLD" | bc -l) )) \
            && { echo "::warning::Validation p99 regression: +${VAL_CHANGE}%"; REGRESSION=true; }
          (( $(echo "$MUT_CHANGE > $THRESHOLD" | bc -l) )) \
            && { echo "::warning::Mutation p99 regression: +${MUT_CHANGE}%"; REGRESSION=true; }
          (( $(echo "$TPS_CHANGE < -$THRESHOLD" | bc -l) )) \
            && { echo "::warning::Throughput regression: ${TPS_CHANGE}%"; REGRESSION=true; }

          echo "regression_detected=$REGRESSION" >> "$GITHUB_OUTPUT"

          cat > results/regression-report.json <<EOF
          {
            "regression_detected": $REGRESSION,
            "threshold_percent": $THRESHOLD,
            "baseline_version": "${{ github.event.inputs.baseline_version || 'webhook-v0.1.0' }}",
            "current_version": "${{ needs.build-webhook.outputs.version }}",
            "metrics": {
              "validation_p99": { "baseline": $BASELINE_VAL, "current": $CURRENT_VAL, "change_percent": $VAL_CHANGE },
              "mutation_p99":   { "baseline": $BASELINE_MUT, "current": $CURRENT_MUT, "change_percent": $MUT_CHANGE },
              "throughput":     { "baseline": $BASELINE_TPS, "current": $CURRENT_TPS, "change_percent": $TPS_CHANGE }
            }
          }
          EOF

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webhook-benchmark-results-${{ needs.build-webhook.outputs.version }}
          path: |
            results/webhook-benchmark.json
            results/webhook-benchmark-report.md
            results/webhook-benchmark-full.json
            results/regression-report.json
          retention-days: 30

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## 🚀 Webhook Performance Benchmark Results"
            echo ""
            echo "**Version:** ${{ needs.build-webhook.outputs.version }}"
            echo "**Commit:** ${{ github.sha }}"
            echo "**Run ID:** ${{ github.run_id }}"
            echo ""
            if [[ -f results/webhook-benchmark-report.md ]]; then
              cat results/webhook-benchmark-report.md
            else
              echo "⚠️ Benchmark report not generated"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Post PR comment ────────────────────────────────────────────────────────
  post-pr-comment:
    name: Post PR Comment
    runs-on: ubuntu-latest
    needs: [build-webhook, webhook-benchmark]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: webhook-benchmark-results-${{ needs.build-webhook.outputs.version }}
          path: results/

      - name: Generate PR comment
        run: |
          {
            printf "## 🚀 Webhook Performance Benchmark Report\n\n"
            printf "**Version:** %s\n" "${{ needs.build-webhook.outputs.version }}"
            printf "**Commit:** %s\n\n" "${{ github.sha }}"

            if [[ -f results/webhook-benchmark.json ]]; then
              VAL_P99=$(jq -r '.webhook_metrics.validation_p99' results/webhook-benchmark.json)
              VAL_P95=$(jq -r '.webhook_metrics.validation_p95' results/webhook-benchmark.json)
              VAL_AVG=$(jq -r '.webhook_metrics.validation_avg' results/webhook-benchmark.json)
              MUT_P99=$(jq -r '.webhook_metrics.mutation_p99' results/webhook-benchmark.json)
              MUT_P95=$(jq -r '.webhook_metrics.mutation_p95' results/webhook-benchmark.json)
              MUT_AVG=$(jq -r '.webhook_metrics.mutation_avg' results/webhook-benchmark.json)
              THROUGHPUT=$(jq -r '.webhook_metrics.throughput' results/webhook-benchmark.json)
              ERROR_RATE=$(jq -r '.webhook_metrics.error_rate' results/webhook-benchmark.json)
              TOTAL=$(jq -r '.webhook_metrics.total_requests' results/webhook-benchmark.json)

              printf "### 📊 Performance Metrics\n\n"
              printf "| Webhook | Avg | p95 | p99 | Threshold |\n|---------|-----|-----|-----|----------|\n"
              printf "| Validation | %s ms | %s ms | %s ms | < 50 ms |\n" "$VAL_AVG" "$VAL_P95" "$VAL_P99"
              printf "| Mutation | %s ms | %s ms | %s ms | < 50 ms |\n\n" "$MUT_AVG" "$MUT_P95" "$MUT_P99"
              printf "| Metric | Value | Threshold |\n|--------|-------|----------|\n"
              printf "| Throughput | %s req/s | > 100 req/s |\n" "$THROUGHPUT"
              printf "| Error Rate | %s%% | < 0.1%% |\n" "$(echo "$ERROR_RATE * 100" | bc)"
              printf "| Total Requests | %s | - |\n\n" "$TOTAL"
            fi

            if [[ -f results/regression-report.json ]]; then
              REGRESSION=$(jq -r '.regression_detected' results/regression-report.json)
              if [[ "$REGRESSION" == "true" ]]; then
                printf "### ⚠️ Regression Detected\n\nPerformance regression detected compared to baseline.\n\n"
              else
                printf "### ✅ No Regression Detected\n\nPerformance is within acceptable thresholds.\n"
              fi
            fi

            printf "\n---\n*Benchmarked with k6 on GitHub Actions*\n"
          } > pr-comment.md

      - name: Post comment
        uses: peter-evans/create-or-update-comment@v5
        continue-on-error: true
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr-comment.md
