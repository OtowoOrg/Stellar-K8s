name: Setup Docker & Login to GHCR
description: >
  Setup Docker Buildx, lowercase IMAGE_NAME, and log in to GitHub Container Registry.

inputs:
  registry:
    description: Container registry
    required: false
    default: "ghcr.io"

outputs:
  image-name:
    description: Lowercased IMAGE_NAME
    value: ${{ steps.lowercase.outputs.image_name }}

runs:
  using: composite
  steps:
    - name: Lowercase IMAGE_NAME
      id: lowercase
      shell: bash
      run: echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
