name: Performance Benchmark

# Unified benchmark pipeline.
# Cluster setup is centralised in .github/actions/setup-perf-env.
# Metric collection and baseline comparison share the same Python script.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      baseline_version:
        description: Baseline version to compare
        required: false
        default: latest
      regression_threshold:
        description: Regression threshold %
        required: false
        default: "10"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  K6_VERSION: "0.54.0"
  PYTHON_VERSION: "3.12"

jobs:
  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "bench-build"

      - name: Build release
        run: cargo build --release --locked

      - name: Build Docker image
        run: docker build -t "stellar-operator:${{ steps.version.outputs.version }}" .

      - name: Save Docker image
        run: |
          docker save "stellar-operator:${{ steps.version.outputs.version }}" \
            | gzip > stellar-operator-image.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bench-artifacts-${{ steps.version.outputs.version }}
          path: |
            target/release/stellar-operator
            stellar-operator-image.tar.gz
          retention-days: 7

  # ── Benchmark ─────────────────────────────────────────────────────────────
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bench-artifacts-${{ needs.build.outputs.version }}

      - name: Load Docker image
        run: |
          gunzip stellar-operator-image.tar.gz
          docker load < stellar-operator-image.tar

      - name: Setup performance environment
        uses: ./.github/actions/setup-perf-env
        with:
          k6-version: ${{ env.K6_VERSION }}
          cluster-name: benchmark
          operator-image-tag: ${{ needs.build.outputs.version }}
          worker-nodes: "2"

      - name: Determine baseline
        id: baseline
        run: |
          BASELINE_VERSION="${{ github.event.inputs.baseline_version || 'latest' }}"
          if [[ "$BASELINE_VERSION" == "latest" ]]; then
            BASELINE_FILE=$(ls -t benchmarks/baselines/*.json 2>/dev/null | head -1 || true)
            [[ -z "$BASELINE_FILE" ]] && BASELINE_FILE="benchmarks/baselines/v0.1.0.json"
          else
            BASELINE_FILE="benchmarks/baselines/${BASELINE_VERSION}.json"
          fi
          echo "baseline_file=$BASELINE_FILE" >> "$GITHUB_OUTPUT"
          [[ -f "$BASELINE_FILE" ]] \
            && echo "has_baseline=true" >> "$GITHUB_OUTPUT" \
            || echo "has_baseline=false" >> "$GITHUB_OUTPUT"

      - name: Run k6 benchmarks
        id: k6
        continue-on-error: true
        run: |
          mkdir -p results
          k6 run \
            --env BASE_URL=http://localhost:8080 \
            --env K8S_API_URL=http://localhost:8001 \
            --env NAMESPACE=stellar-benchmark \
            --env RUN_ID=${{ github.run_id }} \
            --env VERSION=${{ needs.build.outputs.version }} \
            --env GIT_SHA=${{ github.sha }} \
            --env BASELINE_FILE=${{ steps.baseline.outputs.baseline_file }} \
            --out json=results/k6-output.json \
            benchmarks/k6/operator-load-test.js

      - name: Process results
        run: |
          python3 -c "
          import json, os
          raw = 'results/k6-output.json'
          data = []
          if os.path.exists(raw):
              with open(raw) as f:
                  data = [json.loads(l) for l in f if l.strip()]
          metrics = [d for d in data if d.get('type') == 'Point']
          summary = {
              'total_requests': len(metrics),
              'version': '${{ needs.build.outputs.version }}'
          }
          with open('results/benchmark-summary.json', 'w') as f:
              json.dump(summary, f, indent=2)
          "

      - name: Compare with baseline
        id: regression
        if: steps.baseline.outputs.has_baseline == 'true'
        continue-on-error: true
        run: |
          THRESHOLD="${{ github.event.inputs.regression_threshold || '10' }}"
          python3 benchmarks/scripts/compare_benchmarks.py compare \
            --current results/benchmark-summary.json \
            --baseline "${{ steps.baseline.outputs.baseline_file }}" \
            --threshold "$THRESHOLD" \
            --output results/regression-report.json \
            --fail-on-regression \
            --verbose

      - name: Collect operator logs
        if: always()
        run: |
          kubectl logs -n stellar-system -l app=stellar-operator \
            --tail=500 > results/operator-logs.txt || true
          kubectl get events -n stellar-benchmark \
            --sort-by='.lastTimestamp' > results/events.txt || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ needs.build.outputs.version }}
          path: results/
          retention-days: 30

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## 📊 Performance Benchmark Results"
            echo ""
            echo "**Version:** ${{ needs.build.outputs.version }}"
            echo "**Commit:** ${{ github.sha }}"
            echo ""
            if [[ -f results/benchmark-summary.json ]]; then
              echo "### Metrics"
              echo '```json'
              jq '.metrics // {}' results/benchmark-summary.json
              echo '```'
            fi
            if [[ -f results/regression-report.json ]]; then
              PASSED=$(jq -r '.overall_passed // "unknown"' results/regression-report.json)
              if [[ "$PASSED" == "true" ]]; then
                echo "### ✅ Regression Check: PASSED"
              else
                echo "### ❌ Regression Check: FAILED"
                echo '```json'
                jq '.regressions // []' results/regression-report.json
                echo '```'
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on regression
        if: steps.regression.outcome == 'failure'
        run: |
          echo "::error::Performance regression detected! See benchmark results for details."
          exit 1

  # ── Update baseline on release tags ───────────────────────────────────────
  update-baseline:
    name: Update Baseline
    runs-on: ubuntu-latest
    needs: [build, benchmark]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-${{ needs.build.outputs.version }}
          path: results/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create new baseline
        run: |
          VERSION=${{ needs.build.outputs.version }}
          python3 benchmarks/scripts/compare_benchmarks.py baseline \
            --input results/benchmark-summary.json \
            --output "benchmarks/baselines/${VERSION}.json" \
            --version "$VERSION"

      - name: Commit baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/baselines/
          git commit -m "chore: update performance baseline for ${{ needs.build.outputs.version }}" || true
          git push

  # ── Post PR comment ────────────────────────────────────────────────────────
  report:
    name: Post PR Report
    runs-on: ubuntu-latest
    needs: [build, benchmark]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-${{ needs.build.outputs.version }}
          path: results/

      - name: Generate PR comment
        run: |
          {
            printf "## 📊 Performance Benchmark Report\n\n"
            printf "**Version:** %s\n" "${{ needs.build.outputs.version }}"
            printf "**Commit:** %s\n\n" "${{ github.sha }}"

            if [[ -f results/benchmark-summary.json ]]; then
              TPS=$(jq -r '.metrics.tps.avg // "N/A"' results/benchmark-summary.json)
              P95=$(jq -r '.metrics.http_req_duration.p95 // "N/A"' results/benchmark-summary.json)
              P99=$(jq -r '.metrics.http_req_duration.p99 // "N/A"' results/benchmark-summary.json)
              ERRORS=$(jq -r '.metrics.error_rate // "N/A"' results/benchmark-summary.json)
              printf "### Key Metrics\n"
              printf "| Metric | Value |\n|--------|-------|\n"
              printf "| TPS | %s req/s |\n| Latency (p95) | %s ms |\n| Latency (p99) | %s ms |\n| Error Rate | %s |\n\n" \
                "$TPS" "$P95" "$P99" "$ERRORS"
            fi

            if [[ -f results/regression-report.json ]]; then
              PASSED=$(jq -r '.overall_passed' results/regression-report.json)
              SUMMARY=$(jq -r '.summary' results/regression-report.json)
              if [[ "$PASSED" == "true" ]]; then
                printf "### ✅ Regression Check: PASSED\n"
              else
                printf "### ❌ Regression Check: FAILED\n\n**Summary:** %s\n" "$SUMMARY"
              fi
            fi

            printf "\n---\n*Benchmarks run on GitHub Actions*\n"
          } > comment.md

      - name: Post comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
