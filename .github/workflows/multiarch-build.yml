name: Image Build & Verify

# Builds and verifies linux/amd64 images.
# On main branch pushes, publishes image tags sha-<sha> and edge.
# These tags are consumed by release.yml to avoid rebuilding from scratch
# on release.
#
# Layer caching uses a dedicated GitHub Actions cache scope.

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build & verify image ───────────────────────────────────────────────────
  build-image:
    name: Build (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build image for linux/amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: stellar-k8s-test:amd64
          cache-from: type=gha,scope=image-build-amd64
          cache-to: type=gha,mode=max,scope=image-build-amd64
          build-args: |
            BUILDPLATFORM=linux/amd64
            TARGETPLATFORM=linux/amd64
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}

      - name: Verify binaries boot
        run: |
          docker run --rm --platform linux/amd64 \
            stellar-k8s-test:amd64 version
          echo "✓ stellar-operator boots on linux/amd64"

          docker run --rm --platform linux/amd64 \
            --entrypoint /stellar-fork-detector \
            stellar-k8s-test:amd64 --help
          echo "✓ stellar-fork-detector boots on linux/amd64"

          docker run --rm --platform linux/amd64 \
            --entrypoint /stellar-watcher \
            stellar-k8s-test:amd64 --help
          echo "✓ stellar-watcher boots on linux/amd64"

  # ── Publish image tags (main push only) ────────────────────────────────────
  publish-image:
    name: Publish Image
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase IMAGE_NAME
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=edge

      - name: Generate SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=image-build-amd64
          cache-to: type=gha,mode=max,scope=image-build-publish
          build-args: |
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}

      - name: Inspect published image tag
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:edge"

  # ── Architecture benchmark (amd64) ────────────────────────────────────────
  arch-benchmark:
    name: Arch Benchmark (amd64)
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "image-build-bench-amd64"

      - name: Run reconciler benchmark
        run: |
          cargo test --release --lib -- --nocapture 2>&1 \
            | tee bench-amd64.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-amd64
          path: bench-amd64.txt

  # ── Benchmark summary ──────────────────────────────────────────────────────
  summarize-benchmark:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    needs: arch-benchmark
    if: always()
    steps:
      - name: Download amd64 results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: bench-amd64
          path: results/

      - name: Write benchmark summary
        run: |
          {
            echo "## Architecture Benchmark Summary"
            echo ""
            if [[ -f results/bench-amd64.txt ]]; then
              echo "### AMD64 (x86_64)"
              echo '```'
              cat results/bench-amd64.txt
              echo '```'
            else
              echo "⚠️ AMD64 benchmark results not available"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
