# metrics-scrape.yaml — ServiceMonitor-style annotations for dev metrics scraping
apiVersion: v1
kind: Service
metadata:
  name: stellar-node-metrics
  namespace: stellar
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app.kubernetes.io/name: stellar-node
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
