repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^charts/.*/templates/.*\.yaml$
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: env K8S_OPENAPI_ENABLED_VERSION=1.30 cargo clippy --workspace --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: env K8S_OPENAPI_ENABLED_VERSION=1.30 cargo test --workspace --all-features
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

      - id: check-stale-docs
        name: check stale docs
        entry: cargo run --quiet --bin doc-check --
        language: system
        # Run whenever Rust source, docs, or the coverage config changes.
        files: >-
          (?x)^(
            src/.*\.rs|
            docs/.*\.md|
            doc-coverage\.toml|
            \.doc-hashes\.toml|
            Makefile|
            Cargo\.toml|
            build\.rs|
            charts/.*|
            examples/.*|
            config/.*|
            benchmarks/.*|
            formal_verification/.*|
            tests/.*\.rs
          )$
        pass_filenames: false
        # Only warn locally — CI enforces the hard failure.
        args: ["--warn-only", "status"]

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yml]
        exclude: ^charts/.*/templates/.*\.yaml$
