name: Maintenance

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  stale-artifact-audit:
    name: Stale Artifact Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "maintenance"

      - name: Run stale artifact cleanup regression tests
        run: cargo test stale_artifact_cleanup -- --nocapture

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "maintenance-audit"

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2020-0071 \
            --ignore RUSTSEC-2024-0380 \
            --ignore RUSTSEC-2024-0381 \
            --ignore RUSTSEC-2026-0085 \
            --ignore RUSTSEC-2026-0086 \
            --ignore RUSTSEC-2026-0087 \
            --ignore RUSTSEC-2026-0091 \
            --ignore RUSTSEC-2026-0094 \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2026-0149 \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0182 \
            --ignore RUSTSEC-2026-0185

  docs-health:
    name: Docs Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check documentation links
        run: python3 scripts/check-links.py
